<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-premium" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a4a27"/>
      <stop offset="100%" stop-color="#122410"/>
    </linearGradient>

    <linearGradient id="text-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#efeadd"/>
    </linearGradient>

    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5e5e"/>
      <stop offset="100%" stop-color="#d93838"/>
    </linearGradient>

    <clipPath id="icon-clip">
      <rect x="0" y="0" width="500" height="500" />
    </clipPath>
  </defs>

  <rect x="0" y="0" width="500" height="500" fill="url(#bg-premium)"/>

  <g clip-path="url(#icon-clip)">
    <path d="M 0 250 C 200 200, 300 400, 500 250 L 500 500 L 0 500 Z" fill="#ffffff" fill-opacity="0.03"/>
    <path d="M 0 150 C 250 100, 400 300, 500 100 L 500 0 L 0 0 Z" fill="#ffffff" fill-opacity="0.02"/>
    <circle cx="410" cy="185" r="18" fill="url(#accent-grad)"/>

    <text x="250" y="295" font-family="Inter, sans-serif" font-weight="900" font-size="115" fill="url(#text-grad)" text-anchor="middle" letter-spacing="-3">ISTQB</text>

    <text x="250" y="375" font-family="Inter, sans-serif" font-weight="700" font-size="24" fill="#72ac6d" text-anchor="middle" letter-spacing="6">NAUKA</text>
  </g>
</svg>
